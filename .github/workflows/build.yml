name: Build APK (Naruto Senki)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ✅ Java 17 buat SDK
    - name: Setup JDK 17 (SDK)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '17'

    # ✅ Setup Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3
      env:
        SKIP_JDK_VERSION_CHECK: true

    # ✅ Accept licenses
    - name: Accept licenses
      run: yes | sdkmanager --licenses
      env:
        SKIP_JDK_VERSION_CHECK: true

    # ✅ Install SDK + NDK r16b (FIX UTAMA)
    - name: Install SDK components
      run: |
        sdkmanager "platform-tools"
        sdkmanager "platforms;android-30"
        sdkmanager "build-tools;30.0.3"
        sdkmanager "ndk;16.1.4479499"
      env:
        SKIP_JDK_VERSION_CHECK: true

    # ✅ Set NDK path biar kebaca Gradle
    - name: Set NDK path
      run: echo "ANDROID_NDK_HOME=$ANDROID_HOME/ndk/16.1.4479499" >> $GITHUB_ENV

    # 🔽 Java 11 buat Gradle lama
    - name: Setup JDK 11 (Gradle)
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    # ✅ Build APK
    - name: Build APK
      run: |
        cd NarutoSenki/projects/NarutoSenki/proj.android-studio
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    # ✅ Upload APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NarutoSenki-APK
        path: NarutoSenki/projects/NarutoSenki/proj.android-studio/app/build/outputs/apk/debug/app-debug.apk
