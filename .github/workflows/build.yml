name: Build APK (Naruto Senki)

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    # ✅ Pakai Java 11 (WAJIB buat Gradle lama)
    - name: Setup JDK 11
      uses: actions/setup-java@v4
      with:
        distribution: 'temurin'
        java-version: '11'

    # ✅ Setup Android SDK
    - name: Setup Android SDK
      uses: android-actions/setup-android@v3

    # ✅ Accept licenses
    - name: Accept licenses
      run: yes | sdkmanager --licenses

    # ✅ Install platform & build tools (AMAN buat project lama)
    - name: Install SDK components
      run: |
        sdkmanager "platform-tools"
        sdkmanager "platforms;android-30"
        sdkmanager "build-tools;30.0.3"

    # ✅ Install NDK (biar cocos native ke-build)
    - name: Install NDK
      run: sdkmanager "ndk;21.4.7075529"

    # ✅ Build APK via Gradle
    - name: Build APK
      run: |
        cd NarutoSenki/projects/NarutoSenki/proj.android-studio
        chmod +x gradlew
        ./gradlew assembleDebug --stacktrace

    # ✅ Upload hasil APK
    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: NarutoSenki-APK
        path: NarutoSenki/projects/NarutoSenki/proj.android-studio/app/build/outputs/apk/debug/app-debug.apk
