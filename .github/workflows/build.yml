name: Build libcocos2dcpp.so

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Install tools + fix ncurses
      run: |
        sudo apt update
        sudo apt install -y unzip build-essential libncurses5

    - name: Download NDK r16b
      run: |
        wget https://dl.google.com/android/repository/android-ndk-r16b-linux-x86_64.zip
        unzip android-ndk-r16b-linux-x86_64.zip

    - name: Set environment
      run: |
        echo "NDK=$PWD/android-ndk-r16b" >> $GITHUB_ENV
        echo "NDK_MODULE_PATH=$GITHUB_WORKSPACE/NarutoSenki:$GITHUB_WORKSPACE/NarutoSenki/cocos2dx:$GITHUB_WORKSPACE/NarutoSenki/external:$GITHUB_WORKSPACE/NarutoSenki/extensions:$GITHUB_WORKSPACE/NarutoSenki/CocosDenshion:$GITHUB_WORKSPACE/NarutoSenki/scripting/lua:$GITHUB_WORKSPACE/NarutoSenki/scripting/lua/luajit:$GITHUB_WORKSPACE/NarutoSenki/scripting/lua/tolua" >> $GITHUB_ENV

    - name: Clean build (WAJIB)
      run: |
        rm -rf NarutoSenki/**/libs/*
        rm -rf NarutoSenki/**/obj/*
        rm -rf NarutoSenki/**/obj/local/*

    - name: Build
      run: |
        cd NarutoSenki/projects/NarutoSenki/proj.android-studio/app/jni
        $NDK/ndk-build V=1 -j2

    - name: Check result
      run: |
        ls -lah NarutoSenki/projects/NarutoSenki/proj.android-studio/app/obj/local/armeabi-v7a/

    - name: Upload .so
      uses: actions/upload-artifact@v4
      with:
        name: libcocos2dcpp
        path: NarutoSenki/projects/NarutoSenki/proj.android-studio/app/obj/local/armeabi-v7a/libcocos2dcpp.so
